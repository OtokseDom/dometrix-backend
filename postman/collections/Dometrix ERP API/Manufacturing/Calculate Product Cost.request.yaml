$kind: http-request
name: Calculate Product Cost
description: Calculate the total cost of a product including its active BOM with all materials and sub-assemblies
method: POST
url: "{{base_url}}/api/v1/manufacturing/product-cost"
order: 4000
headers:
    Content-Type: application/json
    Accept: application/json
body:
    type: json
    content: |-
        {
          "organization_id": "{{organization_id}}",
          "product_id": "{{product_id}}",
          "quantity": 1,
          "effective_date": "2026-03-31",
          "costing_method": "weighted_average",
          "use_active_bom": true
        }
scripts:
    - type: afterResponse
      code: |-
          if (pm.response.code === 200) {
              var jsonData = pm.response.json();
              if (jsonData.data && jsonData.data.costs) {
                  pm.collectionVariables.set("product_total_cost", jsonData.data.costs.totalCost);
                  pm.collectionVariables.set("product_unit_cost", jsonData.data.unitCost);
              }
          }
      language: text/javascript
