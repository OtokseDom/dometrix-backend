$kind: http-request
name: Calculate BOM Cost
description: Calculate the total cost of a Bill of Materials (BOM) with breakdown by line items
method: POST
url: "{{base_url}}/api/v1/manufacturing/bom-cost"
order: 3000
headers:
    Content-Type: application/json
    Accept: application/json
body:
    type: json
    content: |-
        {
          "organization_id": "{{organization_id}}",
          "bom_id": "{{bom_id}}",
          "quantity": 1,
          "effective_date": "2026-03-31",
          "costing_method": "weighted_average",
          "include_product_cost": false
        }
scripts:
    - type: afterResponse
      code: |-
          if (pm.response.code === 200) {
              var jsonData = pm.response.json();
              if (jsonData.data && jsonData.data.costs) {
                  pm.collectionVariables.set("bom_total_cost", jsonData.data.costs.totalCost);
                  pm.collectionVariables.set("bom_unit_cost", jsonData.data.unitCost);
              }
          }
      language: text/javascript
