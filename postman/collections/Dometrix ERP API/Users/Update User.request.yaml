$kind: http-request
name: Update User
method: PUT
url: '{{base_url}}/api/v1/users/{{user_id}}'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Jane Smith Updated",
      "email": "jane.updated@example.com",
      "password": "newpassword123",
      "metadata": {},
      "is_active": true
    }
