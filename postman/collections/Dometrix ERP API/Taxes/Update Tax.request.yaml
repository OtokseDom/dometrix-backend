$kind: http-request
name: Update Tax
method: PATCH
url: "{{base_url}}/api/v1/taxes/{{resource_id}}"
order: 4000
headers:
    Content-Type: application/json
    Accept: application/json
body:
    type: json
    content: |-
        {
          "name": "Sales Tax 15%",
          "rate": "15.00",
          "is_active": true,
          "metadata": {
            "jurisdiction": "General",
            "effective_date": "2026-04-01"
          }
        }
