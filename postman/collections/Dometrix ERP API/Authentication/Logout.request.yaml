$kind: http-request
name: Logout
method: POST
url: '{{base_url}}/api/v1/auth/logout'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{auth_token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.collectionVariables.set("auth_token", "");
