$kind: http-request
name: Reset Password
method: POST
url: '{{base_url}}/api/v1/auth/password-reset'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "john@example.com",
      "token": "reset-token-here",
      "new_password": "newpassword123",
      "new_password_confirmation": "newpassword123"
    }
